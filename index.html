<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --primary: #4facfe;
      --primary-end: #00f2fe;
      --bg-start: #e8f0fe;
      --bg-end: #d0e8ff;
    }

    * { -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Kanit', sans-serif;
      background: linear-gradient(145deg, var(--bg-start) 0%, var(--bg-end) 100%);
      min-height: 100vh;
      color: #1e293b;
    }

    .insta-card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(79,172,254,0.08), 0 1px 4px rgba(0,0,0,0.04);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-end));
      box-shadow: 0 4px 16px rgba(79,172,254,0.4);
      transition: all 0.25s cubic-bezier(0.34,1.4,0.64,1);
    }
    .btn-primary:active { transform: scale(0.97); }

    .login-input {
      width: 100%; padding: 13px 16px;
      background: #f8faff;
      border: 2px solid #e8f0fe;
      border-radius: 14px;
      outline: none;
      transition: all 0.25s;
      font-family: 'Kanit', sans-serif;
    }
    .login-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79,172,254,0.12); background: white; }

    .nav-bar {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 50;
      border-bottom: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 2px 12px rgba(79,172,254,0.08);
    }

    .nav-pill-wrap {
      display: flex;
      gap: 5px;
      background: #f0f5ff;
      padding: 5px;
      border-radius: 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .nav-pill-wrap::-webkit-scrollbar { display: none; }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 7px 12px;
      border: none;
      border-radius: 11px;
      font-family: 'Kanit', sans-serif;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.25s cubic-bezier(0.34,1.4,0.64,1);
      background: transparent;
      color: #94a3b8;
      position: relative;
    }
    .nav-btn .nav-icon { font-size: 13px; }
    .nav-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-end));
      color: white;
      box-shadow: 0 3px 10px rgba(79,172,254,0.4);
      transform: scale(1.04);
    }
    .nav-btn:not(.active):hover {
      background: white;
      color: var(--primary);
      transform: scale(1.02);
    }

    .score-badge {
      background: white;
      border-radius: 14px;
      border: 1.5px solid #edf2f7;
      transition: all 0.2s;
    }
    .score-badge:hover { border-color: var(--primary); transform: scale(1.02); }

    .btn-read { background-color: #dcfce7 !important; color: #166534 !important; border-color: #bbf7d0 !important; }

    .btn-qa-send {
      background: linear-gradient(135deg, var(--primary), var(--primary-end));
      box-shadow: 0 4px 14px rgba(79,172,254,0.35);
      transition: all 0.25s cubic-bezier(0.34,1.4,0.64,1);
    }
    .btn-qa-send:active { transform: scale(0.97); }

    .section-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .section-header h2 {
      font-size: 20px; font-weight: 900;
      color: #1e293b;
      letter-spacing: -0.3px;
    }
    .section-header p {
      font-size: 10px; font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 2px;
    }

    .accordion-content-wrapper {
      max-height: 0; overflow: hidden; opacity: 0;
      transition: max-height 0.45s ease-in-out, opacity 0.3s ease-in-out, margin 0.3s ease;
      pointer-events: none;
    }
    .accordion-content-wrapper.is-open {
      max-height: 3000px; opacity: 1;
      pointer-events: auto; margin-top: 8px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.3s ease forwards; }

    /* ── [แก้ไข] ความหนาตัวเลขนับถอยหลัง ── */
    .countdown-num {
      font-size: 2.5rem;      /* ขนาดตัวเลข */
      font-weight: 700;       /* ← หนาสุด */
      line-height: 1;
      letter-spacing: -1px;
    }
    .countdown-sep {
      font-size: 2rem;
      font-weight: 700;       /* ← หนาสุด */
      margin-bottom: 1rem;
    }
    .countdown-label {
      font-size: 10px;
      font-weight: 700;       /* ← หนากว่าเดิม (เดิมเป็น bold=700) */
      opacity: 0.85;
      margin-top: 3px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- ── Login Screen ── -->
  <div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center p-6">
    <div class="max-w-sm w-full">
      <div class="text-center mb-6 fade-up">
        <div class="inline-flex p-5 rounded-3xl bg-white shadow-xl mb-4" style="box-shadow:0 8px 32px rgba(79,172,254,0.18)">
          <span style="font-size:48px">🎓</span>
        </div>
        <h1 style="font-size:36px;font-weight:900;background:linear-gradient(135deg,#4facfe,#00f2fe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Qtutor</h1>
        <p style="font-size:13px;color:#94a3b8;margin-top:4px;">ระบบสรุปผลคะแนน "เฮือกสุดท้าย" 🔥</p>
      </div>
      <div class="fade-up" style="background:rgba(255,255,255,0.95);border-radius:24px;padding:28px;box-shadow:0 8px 32px rgba(79,172,254,0.12);animation-delay:0.1s">
        <select id="loginName" class="login-input cursor-pointer text-center font-semibold mb-3">
          <option value="">กำลังโหลดรายชื่อ...</option>
        </select>
        <input type="tel" id="loginPhone" placeholder="เบอร์โทรศัพท์ผู้ปกครอง เช่น 097018****" class="login-input text-center mb-5">
        <button onclick="handleLogin()" id="btnLogin" class="btn-primary w-full text-white font-bold py-4 rounded-2xl text-[15px]">
          เข้าสู่ระบบ →
        </button>
        <p class="text-center mt-5 text-[10px] text-gray-300 uppercase tracking-widest">พัฒนาโดย พี่เท็น กวดวิชาคิวติวเตอร์</p>
      </div>
    </div>
  </div>

  <!-- ── Main Content ── -->
  <div id="main-content" class="hidden">

    <nav class="nav-bar px-4 pt-4 pb-3 mb-5">
      <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-3">
          <h1 style="font-size:20px;font-weight:900;background:linear-gradient(135deg,#4facfe,#00f2fe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Qtutor</h1>
          <button onclick="handleLogout()" style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#ef4444;background:none;border:none;cursor:pointer;font-family:'Kanit',sans-serif;">
            ออกจากระบบ
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          </button>
        </div>
        <div class="nav-pill-wrap">
          <button onclick="showSection('individual')" id="btn-indiv" class="nav-btn active">
            <span class="nav-icon">📊</span>ของฉัน
          </button>
          <button onclick="showSection('overview')" id="btn-over" class="nav-btn">
            <span class="nav-icon">🏆</span>อันดับ
          </button>
          <button onclick="showSection('answers')" id="btn-answers" class="nav-btn">
            <span class="nav-icon">📖</span>เฉลย
          </button>
          <button onclick="showSection('videos')" id="btn-videos" class="nav-btn">
            <span class="nav-icon">🎬</span>เรียน
          </button>
          <button onclick="showSection('qa')" id="btn-qa" class="nav-btn" style="position:relative;">
            <span class="nav-icon">💬</span>Q&A
            <span id="qa-badge" class="hidden" style="position:absolute;top:3px;right:3px;width:7px;height:7px;background:#ef4444;border-radius:50%;border:1.5px solid white;"></span>
          </button>
        </div>
      </div>
    </nav>

    <main class="max-w-md mx-auto px-4 pb-10">
      <section id="individual-section">
        <div id="admin-selector-area"></div>
        <div id="indivContent"></div>
      </section>

      <section id="overview-section" class="hidden">
        <div class="insta-card p-5 mb-5 fade-up">
          <label class="text-[11px] font-bold text-gray-400 mb-2 block uppercase tracking-widest text-center">เลือกชุดการสอบ</label>
          <select id="testSelect" onchange="renderOverview()" class="w-full p-3 bg-blue-50 border-0 rounded-xl outline-none font-bold text-blue-600 text-center cursor-pointer" style="font-family:'Kanit',sans-serif;"></select>
        </div>
        <div id="overContent"></div>
      </section>

      <section id="answers-section" class="hidden">
        <div class="insta-card p-6 fade-up">
          <div class="section-header">
            <h2>📖 คลังเฉลย</h2>
            <p>เฉลยแยกตามวันที่เรียน</p>
          </div>
          <div id="answerList" class="space-y-3"></div>
        </div>
      </section>

      <section id="qa-section" class="hidden">
        <div class="insta-card p-6 mb-5 fade-up">
          <div class="section-header">
            <h2>💬 ถามครูผู้สอน</h2>
            <p>ตอบกลับภายใน 24 ชั่วโมง</p>
          </div>
          <textarea id="questionInput" rows="3" placeholder="น้องมีข้อสงสัยตรงไหน พิมพ์ถามครูได้เลยนะครับ..." style="width:100%;padding:14px;background:#f8faff;border:2px solid #e8f0fe;border-radius:14px;outline:none;font-family:'Kanit',sans-serif;font-size:13px;resize:none;margin-bottom:12px;transition:border 0.2s;" onfocus="this.style.borderColor='#4facfe'" onblur="this.style.borderColor='#e8f0fe'"></textarea>
          <button onclick="submitQuestion()" class="btn-qa-send w-full text-white font-bold py-3 rounded-2xl text-[14px]">
            ส่งคำถาม 📨
          </button>
        </div>
        <div id="qa-history" class="space-y-4 pb-10"></div>
      </section>
    </main>

    <main id="main-container" class="max-w-md mx-auto px-4 pb-10">
      <section id="videos-section" class="hidden">
        <div id="video-dashboard" class="mb-6"></div>
        <div id="videoList" class="flex flex-col gap-4 w-full max-w-3xl mx-auto"></div>
      </section>
    </main>
  </div>

  <script>
    let globalData    = [];
    let currentUser   = "";
    let isAdmin       = false;
    let readFilesList = [];

    let isAnswersLoaded = false;
    let isVideosLoaded  = false;
    let isQALoaded      = false;
    let studentProgress = [];

    window.onload = () => {
      const loadTimeout = setTimeout(() => {
        Swal.fire({
          icon: 'warning', title: 'โหลดข้อมูลช้า',
          text: 'กรุณาตรวจสอบการเชื่อมต่อ แล้วลองรีเฟรชใหม่',
          confirmButtonText: 'รีเฟรช', confirmButtonColor: '#4facfe'
        }).then(() => location.reload());
      }, 15000);

      google.script.run
        .withSuccessHandler(res => {
          clearTimeout(loadTimeout);
          if (res.error) {
            Swal.fire({ icon: 'error', title: 'โหลดข้อมูลไม่สำเร็จ', text: 'กรุณารีเฟรชหน้าใหม่', confirmButtonColor: '#4facfe' });
            return;
          }
          globalData = res.rows;
          populateLoginSelector();
          populateTestSelector();

          try {
            const savedUser    = localStorage.getItem('qtutor_user');
            const savedIsAdmin = localStorage.getItem('qtutor_isAdmin') === 'true';
            if (savedUser) {
              const stillExists = savedIsAdmin || globalData.some(r => r[0] === savedUser);
              if (stillExists) {
                currentUser = savedUser;
                isAdmin     = savedIsAdmin;
                afterLogin();
              } else {
                localStorage.clear();
              }
            }
          } catch (e) {
            try { localStorage.clear(); } catch (_) {}
          }
        })
        .withFailureHandler(err => {
          clearTimeout(loadTimeout);
          Swal.fire({
            icon: 'error', title: 'เชื่อมต่อไม่สำเร็จ',
            text: 'กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต',
            confirmButtonText: 'ลองใหม่', confirmButtonColor: '#4facfe'
          }).then(() => location.reload());
        })
        .getSheetData();
    };

    function populateLoginSelector() {
      const sel   = document.getElementById('loginName');
      const names = [...new Set(globalData.map(r => r[0]))].sort();
      names.unshift("admin");
      sel.innerHTML = '<option value="">กรุณาเลือกชื่อเล่นของน้อง</option>';
      names.forEach(n => sel.add(new Option(n, n)));
    }

    function handleLogin() {
      const name  = document.getElementById('loginName').value;
      const phone = document.getElementById('loginPhone').value.trim();
      if (!name || !phone) {
        Swal.fire({ icon: 'warning', title: 'กรุณากรอกข้อมูล', text: 'กรุณาเลือกชื่อและใส่เบอร์โทรศัพท์', confirmButtonColor: '#4facfe' });
        return;
      }
      Swal.fire({ title: 'กำลังตรวจสอบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      google.script.run
        .withSuccessHandler(res => {
          Swal.close();
          if (res.success) {
            currentUser = res.name;
            isAdmin     = res.isAdmin;
            localStorage.setItem('qtutor_user',    res.name);
            localStorage.setItem('qtutor_isAdmin', res.isAdmin);
            afterLogin();
            Swal.fire({ icon: 'success', title: `ยินดีต้อนรับน้อง ${res.name}`, toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
          } else {
            Swal.fire({ icon: 'error', title: 'เข้าสู่ระบบไม่สำเร็จ', text: res.message, confirmButtonColor: '#ef4444' });
          }
        })
        .checkLogin(name, phone);
    }

    function afterLogin() {
      google.script.run
        .withSuccessHandler(files => { readFilesList = files; })
        .getReadLogs(currentUser);

      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('main-content').classList.remove('hidden');

      isAdmin ? setupAdminView() : renderIndividual(currentUser);
      renderAnswers();
      renderCountdown();
      checkQABadge();

      if (!isAdmin) setInterval(checkQABadge, 30000);
    }

    // ─── [แก้ไข] ฟีเจอร์นับถอยหลัง — ใช้ class countdown-num/sep/label ──
    function renderCountdown() {
      if (isAdmin) return;
      const EXAM_DATE = new Date('2026-03-28T08:00:00');

      function update() {
        const now    = new Date();
        const diffMs = EXAM_DATE - now;
        const area   = document.getElementById('countdown-widget');
        if (!area) return;

        let html = '';
        if (diffMs <= 0) {
          html = `<div class="insta-card p-4 mb-4 text-center border-0 bg-gradient-to-r from-green-500 to-emerald-400">
            <p class="text-white font-black text-lg">🎉 วันสอบมาถึงแล้ว! สู้ๆ นะครับ</p>
          </div>`;
        } else {
          const days    = Math.floor(diffMs / (1000 * 60 * 60 * 24));
          const hours   = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
          const minutes = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((diffMs % (1000 * 60)) / 1000);
          const urgency = days <= 7  ? 'from-red-500 to-orange-400'
                        : days <= 30 ? 'from-orange-400 to-yellow-400'
                        :              'from-blue-500 to-cyan-400';
          /* ── [แก้ไข] ใช้ class countdown-num / countdown-sep / countdown-label ── */
          html = `
            <div class="insta-card p-4 mb-4 border-0 bg-gradient-to-r ${urgency} text-white text-center shadow-lg">
              <p style="font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:2px;opacity:0.85;margin-bottom:10px;">⏳ เหลือเวลาอีก</p>
              <div class="flex justify-center items-end gap-2">
                <div>
                  <p class="countdown-num">${days}</p>
                  <p class="countdown-label">วัน</p>
                </div>
                <p class="countdown-sep">:</p>
                <div>
                  <p class="countdown-num">${String(hours).padStart(2,'0')}</p>
                  <p class="countdown-label">ชั่วโมง</p>
                </div>
                <p class="countdown-sep">:</p>
                <div>
                  <p class="countdown-num">${String(minutes).padStart(2,'0')}</p>
                  <p class="countdown-label">นาที</p>
                </div>
                <p class="countdown-sep">:</p>
                <div>
                  <p class="countdown-num tabular-nums">${String(seconds).padStart(2,'0')}</p>
                  <p class="countdown-label">วินาที</p>
                </div>
              </div>
              <p style="font-size:10px;margin-top:12px;opacity:0.85;font-style:italic;font-weight:600;">ก่อนวันสอบเข้า ม.1 💪</p>
            </div>`;
        }
        area.innerHTML = html;
      }

      const existing = document.getElementById('countdown-widget');
      if (existing) existing.remove();
      const el = document.createElement('div');
      el.id = 'countdown-widget';
      const area = document.getElementById('admin-selector-area');
      area.parentNode.insertBefore(el, area.nextSibling);

      update();
      setInterval(update, 1000);
    }

    function checkQABadge() {
      if (isAdmin) return;
      google.script.run
        .withSuccessHandler(qaList => {
          const hasNew = qaList.some(item =>
            item.answer && item.answer !== "รอครูผู้สอนตอบสักครู่..."
            && !localStorage.getItem(`qa_read_${currentUser}_${item.date}`)
          );
          document.getElementById('qa-badge').classList.toggle('hidden', !hasNew);
        })
        .getMyQA(currentUser);
    }

    function handleLogout() {
      Swal.fire({ title: 'ออกจากระบบ?', icon: 'warning', showCancelButton: true, confirmButtonText: 'ตกลง' })
        .then(res => { if (res.isConfirmed) { localStorage.clear(); location.reload(); } });
    }

    function showSection(sec) {
      const mainContainer = document.getElementById('main-container');
      if (sec === 'videos') {
        mainContainer.classList.replace('max-w-md', 'max-w-full');
        mainContainer.classList.add('lg:px-20');
      } else {
        mainContainer.classList.replace('max-w-full', 'max-w-md');
        mainContainer.classList.remove('lg:px-20');
      }

      ['individual', 'overview', 'answers', 'qa', 'videos'].forEach(s => {
        document.getElementById(`${s}-section`)?.classList.add('hidden');
      });
      document.getElementById(`${sec}-section`)?.classList.remove('hidden');

      const btnMap = { individual: 'btn-indiv', overview: 'btn-over', answers: 'btn-answers', qa: 'btn-qa', videos: 'btn-videos' };
      Object.entries(btnMap).forEach(([key, id]) => {
        const btn = document.getElementById(id);
        if (!btn) return;
        btn.classList.toggle('active', key === sec);
      });

      if (sec === 'qa') document.getElementById('qa-badge').classList.add('hidden');
      if (sec === 'videos' && !isVideosLoaded) renderVideos();
      if (sec === 'qa'     && !isQALoaded)     renderQA();
    }

    function setupAdminView() {
      const names = [...new Set(globalData.map(r => r[0]))].sort();
      document.getElementById('admin-selector-area').innerHTML = `
        <div class="insta-card p-4 mb-6 bg-blue-600 text-center">
          <p class="text-[10px] font-bold text-white/70 mb-2 uppercase italic">Admin Mode</p>
          <select onchange="renderIndividual(this.value)" class="w-full p-3 bg-white border-0 rounded-xl outline-none font-bold text-blue-600">
            <option value="">ค้นหารายชื่อ...</option>
            ${names.map(n => `<option value="${n}">${n}</option>`).join('')}
          </select>
        </div>`;
    }

    function populateTestSelector() {
      const sel   = document.getElementById('testSelect');
      const tests = [...new Set(globalData.map(r => r[8]))].sort();
      sel.innerHTML = '<option value="">เลือกครั้งที่สอบ...</option>';
      tests.forEach(t => sel.add(new Option(t, t)));
    }

    function renderIndividual(name) {
      if (!name) return;
      const filtered = globalData
        .filter(r => r[0] === name)
        .sort((a, b) => a[8].toString().localeCompare(b[8].toString(), undefined, { numeric: true }));

      const scores = filtered.map(r => parseFloat(r[7] || 0));
      const avg    = (scores.reduce((a, b) => a + b, 0) / filtered.length).toFixed(2);

      document.getElementById('indivContent').innerHTML = `
        <div class="insta-card p-6 shadow-xl border-0 bg-white">

                            <span style="font-size:10px;color:rgba(255,255,255,0.5);">
                              ${totalVideos > 0 ? `${completedVideos}/${totalVideos} วิดีโอเสร็จแล้ว` : 'ไม่มีคลิปวิดีโอ'}
                            </span>
                          </div>
                          <h3 style="font-weight:700;font-size:15px;color:white;margin:0 0 12px;">${groupName}</h3>
                          <div style="background:rgba(255,255,255,0.1);height:5px;border-radius:99px;overflow:hidden;">
                            <div style="background:linear-gradient(to right,#4facfe,#00f2fe);height:100%;width:${percent}%;border-radius:99px;transition:width 1s ease;"></div>
                          </div>
                        </div>
                        <div style="margin-left:16px;text-align:center;">
                          <div style="width:44px;height:44px;border-radius:50%;background:${percent===100?'rgba(34,197,94,0.2)':'rgba(79,172,254,0.15)'};display:flex;align-items:center;justify-content:center;margin-bottom:4px;">
                            <span style="font-size:13px;font-weight:700;color:${percent===100?'#22c55e':'#4facfe'};">${percent}%</span>
                          </div>
                          <svg id="arrow-${idx}" style="width:16px;height:16px;color:rgba(255,255,255,0.4);transition:transform 0.3s;margin:0 auto;display:block;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                          </svg>
                        </div>
                      </div>
                    </div>

                    <div id="content-${idx}" class="accordion-content-wrapper" style="background:#fafbff;">
                      <div style="padding:10px;">
                        ${items.map((item) => {
                          const cleanTitle    = item.subTitle.trim();
                          const isDone        = progress.includes(`${item.lessonId}-${cleanTitle}`);
                          const isVideo       = item.type.toLowerCase().includes('video');

                          // ── [แก้ไข] นับ index เฉพาะวิดีโอ และคำนวณ % แต่ละคลิป ──
                          let clipLabel = '';
                          let clipPct   = '';
                          if (isVideo) {
                            videoIndexInGroup++;
                            const pct = isDone ? 100 : 0; // 0% = ยังไม่ดู, 100% = ดูแล้ว
                            clipLabel = `${videoIndexInGroup}/${totalVideos}`;
                            clipPct   = `${pct}%`;
                          }

                          const btnText       = isDone ? '✓ เสร็จแล้ว' : (isVideo ? '▶ เข้าเรียน' : '📄 ดูชีท');
                          const onclickAction = isVideo
                            ? `handleAccess('${item.lessonId}', \`${cleanTitle}\`, '${item.url}', '${item.password}', true)`
                            : `handleAccess('${item.lessonId}', \`${cleanTitle}\`, '${item.url}', '${item.password}', false)`;

                          return `
                            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px;border-radius:14px;background:white;margin-bottom:6px;border:1.5px solid ${isDone?'#bbf7d0':'#f1f5f9'};transition:all 0.2s;"
                              onmouseover="this.style.borderColor='#4facfe';this.style.boxShadow='0 2px 8px rgba(79,172,254,0.12)'"
                              onmouseout="this.style.borderColor='${isDone?'#bbf7d0':'#f1f5f9'}';this.style.boxShadow='none'">
                              <div style="display:flex;align-items:center;gap:12px;flex:1;min-width:0;">
                                <!-- Icon -->
                                <div style="width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
                                  background:${isDone?'#f0fdf4':isVideo?'#eff6ff':'#f5f3ff'};">
                                  <span style="font-size:16px;">${isDone ? '✅' : isVideo ? '🎬' : '📄'}</span>
                                </div>
                                <div style="min-width:0;flex:1;">
                                  <p style="font-size:13px;font-weight:600;color:#1e293b;margin:0;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${cleanTitle}</p>
                                  <div style="display:flex;align-items:center;gap:6px;margin-top:3px;">
                                    ${item.duration ? `<span style="font-size:10px;color:#94a3b8;">${item.duration}</span>` : ''}
                                    ${isVideo ? `
                                      <!-- [แก้ไข] แสดง x/y และ % แยกแต่ละคลิป -->
                                      <span style="font-size:10px;font-weight:700;color:#64748b;background:#f1f5f9;border-radius:4px;padding:1px 5px;">คลิป ${clipLabel}</span>
                                      <span style="font-size:10px;font-weight:700;color:${isDone?'#16a34a':'#0ea5e9'};background:${isDone?'#f0fdf4':'#eff6ff'};border-radius:4px;padding:1px 6px;">${clipPct}</span>
                                    ` : ''}
                                  </div>
                                  ${isVideo ? `
                                    <div style="margin-top:5px;background:#e2e8f0;height:3px;border-radius:99px;overflow:hidden;width:100%;">
                                      <div style="height:100%;width:${isDone?'100':'0'}%;background:${isDone?'#22c55e':'#4facfe'};border-radius:99px;transition:width 0.6s ease;"></div>
                                    </div>` : ''}
                                </div>
                              </div>
                              <button onclick="${onclickAction}" style="
                                padding:7px 14px;border-radius:10px;font-family:'Kanit',sans-serif;font-size:11px;font-weight:700;border:none;cursor:pointer;white-space:nowrap;flex-shrink:0;margin-left:10px;transition:all 0.2s;
                                ${isDone
                                  ? 'background:#f0fdf4;color:#16a34a;cursor:default;'
                                  : 'background:linear-gradient(135deg,#4facfe,#00f2fe);color:white;box-shadow:0 3px 8px rgba(79,172,254,0.3);'}">
                                ${btnText}
                              </button>
                            </div>`;
                        }).join('')}
                      </div>
                    </div>
                  </div>`;
              }).join('');
            })
            .getStudentProgress(currentUser);
        })
        .getVideoData();
    }

    function toggleAccordion(idx, type) {
      const contentId = type === 'video' ? `content-${idx}` : `answer-content-${idx}`;
      const arrowId   = type === 'video' ? `arrow-${idx}`   : `icon-${idx}`;
      const content   = document.getElementById(contentId);
      const arrow     = document.getElementById(arrowId);
      if (!content) return;

      const isOpen = content.classList.contains('is-open');
      content.classList.toggle('is-open', !isOpen);

      if (type === 'video') {
        arrow.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
      } else {
        arrow.innerText = isOpen ? '▼' : '▲';
        arrow.classList.toggle('text-blue-500', !isOpen);
      }
    }

    function handleAccess(id, title, url, pass, isVideo) {
      const hasPass = pass && pass.toString().trim() !== "" && pass.toString() !== "0";
      const proceed = () => {
        if (isVideo) {
          openVideoPlayer(id, title, url);
        } else {
          const previewUrl = url.replace('/view?usp=sharing', '/preview').replace('/view', '/preview');
          Swal.fire({
            title: `<span class="text-lg font-bold">${title}</span>`,
            html: `
              <iframe src="${previewUrl}" width="100%" height="480px" style="border:none;border-radius:12px;" onerror="this.style.display='none'"></iframe>
              <a href="${url}" target="_blank" style="display:block;margin-top:12px;background:linear-gradient(135deg,#4facfe,#00f2fe);color:white;font-weight:700;padding:12px;border-radius:12px;text-decoration:none;font-size:13px;">
                📂 เปิดใน Google Drive
              </a>`,
            width: '95%', showCloseButton: true, showConfirmButton: false
          });
        }
      };

      if (!hasPass) {
        proceed();
      } else {
        Swal.fire({ title: 'กรุณากรอกรหัสผ่าน', input: 'text', showCancelButton: true })
          .then(res => {
            if (res.value === pass.toString()) proceed();
            else if (res.value) Swal.fire('รหัสผ่านไม่ถูกต้อง', '', 'error');
          });
      }
    }

    function openVideoPlayer(id, title, url) {
      const videoId  = extractVideoId(url);
      const embedUrl = `https://www.youtube.com/embed/${videoId}?enablejsapi=1&autoplay=1`;

      Swal.fire({
        title: `<span class="text-lg font-bold">${title}</span>`,
        html: `
          <div class="aspect-video bg-black rounded-lg overflow-hidden shadow-lg">
            <iframe id="yt-player" width="100%" height="100%" src="${embedUrl}"
              frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
          </div>
          <div style="margin-top:12px;background:#f8faff;border-radius:12px;padding:12px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
              <span style="font-size:11px;font-weight:700;color:#64748b;">ความคืบหน้า</span>
              <span id="watch-pct" style="font-size:11px;font-weight:700;color:#4facfe;">0%</span>
            </div>
            <div style="background:#e2e8f0;height:5px;border-radius:99px;overflow:hidden;">
              <div id="watch-bar" style="background:linear-gradient(to right,#4facfe,#00f2fe);height:100%;width:0%;border-radius:99px;transition:width 0.5s ease;"></div>
            </div>
            <p id="watch-msg" style="font-size:10px;color:#94a3b8;margin:6px 0 0;text-align:center;">ดูวิดีโอให้ครบ 80% เพื่อบันทึกความคืบหน้า</p>
          </div>`,
        width: '90%', showConfirmButton: false, showCloseButton: true,
        didOpen: () => {
          let marked = false;
          let pollInterval = null;

          const player = new YT.Player('yt-player', {
            events: {
              onReady: () => {
                pollInterval = setInterval(() => {
                  try {
                    const current  = player.getCurrentTime();
                    const duration = player.getDuration();
                    if (!duration) return;

                    const pct = Math.round((current / duration) * 100);
                    document.getElementById('watch-pct').textContent = pct + '%';
                    document.getElementById('watch-bar').style.width  = pct + '%';

                    if (pct >= 80 && !marked) {
                      marked = true;
                      document.getElementById('watch-msg').textContent  = '✅ บันทึกความคืบหน้าแล้ว!';
                      document.getElementById('watch-msg').style.color  = '#22c55e';
                      document.getElementById('watch-pct').style.color  = '#22c55e';
                      document.getElementById('watch-bar').style.background = '#22c55e';
                      google.script.run
                        .withSuccessHandler(() => { isVideosLoaded = false; renderVideos(); })
                        .markVideoAsComplete(currentUser, id, title);
                    }
                  } catch(e) {}
                }, 2000);
              },
              onStateChange: event => {
                if (event.data === YT.PlayerState.ENDED && !marked) {
                  marked = true;
                  document.getElementById('watch-msg').textContent = '✅ บันทึกความคืบหน้าแล้ว!';
                  document.getElementById('watch-msg').style.color = '#22c55e';
                  google.script.run
                    .withSuccessHandler(() => {
                      Swal.fire({ icon: 'success', title: 'เยี่ยมมาก! 🎉', text: 'บันทึกการเรียนบทนี้แล้ว', timer: 1500, showConfirmButton: false });
                      isVideosLoaded = false;
                      renderVideos();
                    })
                    .markVideoAsComplete(currentUser, id, title);
                }
              }
            }
          });

          Swal.getPopup().addEventListener('click', e => {
            if (e.target.classList.contains('swal2-close')) {
              if (pollInterval) clearInterval(pollInterval);
            }
          });
        }
      });
    }

    function extractVideoId(url) {
      const match = url.match(/^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
      return match && match[2].length === 11 ? match[2] : null;
    }

    function submitQuestion() {
      const msg = document.getElementById('questionInput').value.trim();
      if (!msg) return;
      Swal.fire({ title: 'กำลังส่ง...', didOpen: () => Swal.showLoading() });
      google.script.run
        .withSuccessHandler(() => {
          document.getElementById('questionInput').value = "";
          isQALoaded = false;
          renderQA();
          Swal.fire({ icon: 'success', title: 'ส่งคำถามสำเร็จ!', timer: 1500, showConfirmButton: false });
        })
        .submitQuestionToServer(currentUser, msg);
    }

    function renderQA() {
      if (isQALoaded) return;
      const container = document.getElementById('qa-history');
      container.innerHTML = '<p class="text-center text-gray-400 text-xs py-10">กำลังโหลดคำถาม...</p>';
      google.script.run
        .withSuccessHandler(qaList => {
          isQALoaded = true;
          if (!qaList || qaList.length === 0) {
            container.innerHTML = '<p class="text-center text-gray-400 text-xs py-10">ยังไม่มีประวัติการถาม</p>';
            return;
          }
          container.innerHTML = qaList.map(item => `
            <div class="bg-white p-4 rounded-2xl border border-gray-50 shadow-sm">
              <div class="text-[10px] text-gray-400 mb-2 font-bold uppercase">${item.date}</div>
              <p class="text-sm text-gray-700 mb-3 font-medium">❓ ${item.question}</p>
              <div class="pl-4 border-l-2 border-green-400 bg-green-50/30 p-3 rounded-r-xl">
                <p class="text-[10px] text-green-600 font-bold mb-1">ครูผู้สอนตอบ:</p>
                <p class="text-sm text-gray-800 font-bold">${item.answer}</p>
              </div>
            </div>`).join('');
        })
        .getMyQA(currentUser);
    }

    function downloadScoreImage(btn) {
      const area = document.getElementById('capture-area');
      btn.innerHTML = "⌛...";
      btn.disabled  = true;
      html2canvas(area, { scale: 3, backgroundColor: "#ffffff", logging: false }).then(canvas => {
        const link      = document.createElement('a');
        link.download   = 'My-Ranking.png';
        link.href       = canvas.toDataURL("image/png");
        link.click();
        btn.innerHTML   = "📸 บันทึกภาพ";
        btn.disabled    = false;
      });
    }

    function downloadIndividualImage(btn) {
      const area = document.getElementById('capture-individual');
      btn.innerHTML = "⌛...";
      btn.disabled  = true;
      html2canvas(area, { scale: 3, backgroundColor: "#ffffff", logging: false, useCORS: true }).then(canvas => {
        const name    = document.querySelector('#capture-individual h2')?.innerText || 'Report';
        const link    = document.createElement('a');
        link.download = `Report-${name}.png`;
        link.href     = canvas.toDataURL("image/png");
        link.click();
        btn.innerHTML = "📸 บันทึกภาพ";
        btn.disabled  = false;
      });
    }
  </script>
  <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
